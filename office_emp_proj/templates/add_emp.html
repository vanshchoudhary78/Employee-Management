{% extends 'base.html' %}

{% block title %}Add Employee - Employee Management System{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card">
      <div class="card-header bg-success text-white">
        <h3 class="card-title mb-0"><i class="fas fa-user-plus"></i> Add New Employee</h3>
      </div>
      <div class="card-body">
        {% if message %}
        <div class="alert alert-success alert-dismissible fade show" role="alert">
          <i class="fas fa-check-circle"></i> {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        {% endif %}
        
        <form method="post" action="{% url 'add_emp' %}">
          {% csrf_token %}
          
          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="first_name" class="form-label">First Name *</label>
              <input type="text" class="form-control" id="first_name" name="first_name" required>
            </div>
            <div class="col-md-6 mb-3">
              <label for="last_name" class="form-label">Last Name *</label>
              <input type="text" class="form-control" id="last_name" name="last_name" required>
            </div>
          </div>
          
          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="dept" class="form-label">Department *</label>
              <select class="form-select" id="dept" name="dept" required>
                <option value="">Select Department</option>
                {% for dept in depts %}
                <option value="{{ dept.id }}">{{ dept.name }} ({{ dept.location }})</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-6 mb-3">
              <label for="role" class="form-label">Role *</label>
              <select class="form-select" id="role" name="role" required>
                <option value="">Select Role</option>
                {% for role in roles %}
                <option value="{{ role.id }}">{{ role.name }}</option>
                {% endfor %}
              </select>
            </div>
          </div>
          
          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="salary" class="form-label">Salary *</label>
              <div class="input-group">
                <span class="input-group-text">$</span>
                <input type="number" class="form-control" id="salary" name="salary" min="0" step="0.01" required>
              </div>
            </div>
            <div class="col-md-6 mb-3">
              <label for="bonus" class="form-label">Bonus</label>
              <div class="input-group">
                <span class="input-group-text">$</span>
                <input type="number" class="form-control" id="bonus" name="bonus" min="0" step="0.01" value="0">
              </div>
            </div>
          </div>
          
          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="phone" class="form-label">Phone Number *</label>
              <input type="tel" class="form-control" id="phone" name="phone" required>
            </div>
            <div class="col-md-6 mb-3">
              <label for="hire_date" class="form-label">Hire Date *</label>
              <input type="date" class="form-control" id="hire_date" name="hire_date" required>
            </div>
          </div>
          
          <div class="d-grid gap-2 d-md-flex justify-content-md-end">
            <button type="reset" class="btn btn-secondary me-md-2">Reset Form</button>
            <button type="submit" class="btn btn-success"><i class="fas fa-save"></i> Add Employee</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
